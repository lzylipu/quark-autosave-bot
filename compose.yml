name: quark-autosave-bot

services:
  bot:
    image: lzylipu/quarkbot:latest
    container_name: quarkbot
    environment:
      PORT: 8080
      SUPERUSER: "${SUPERUSER}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      QAS_ENDPOINT: "${QAS_ENDPOINT:-http://quark-auto-save:5005}"
      QAS_TOKEN: "${QAS_TOKEN}"
      SIMPLE_COMMAND: "${SIMPLE_COMMAND:-1}"
      SIMPLE_SAVE_ROOT: "${SIMPLE_SAVE_ROOT:-auto}"
    restart: unless-stopped
    depends_on: [quark-auto-save]
    networks: [quark-net]

  quark-auto-save:
    image: cp0204/quark-auto-save:latest
    container_name: quark-auto-save
    ports:
      - "${QAS_PORT:-5005}:5005"
    restart: unless-stopped
    networks: [quark-net]
    environment:
      PORT: 5005
      WEBUI_USERNAME: "${QAS_WEBUI_USER:-admin}"
      WEBUI_PASSWORD: "${QAS_WEBUI_PASS}"
    volumes:
      - ./qas-config:/app/config
      - ./qas-media:/media

networks:
  quark-net:
    driver: bridge
